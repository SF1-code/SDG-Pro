<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Двойной маятник с управлением платформой</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Двойной маятник – ручная стабилизация в верхнем положении</h1>
        <canvas id="pendulumCanvas" width="900" height="600"></canvas>
        <div class="controls">
            <div class="control-group">
                <button id="resetUpBtn">Поставить вверх</button>
                <button id="resetDownBtn">Опустить вниз</button>
                <button id="stopBtn">Стоп/Пуск</button>
            </div>
            <div class="control-group">
                <label>Платформа X: 
                    <input type="range" id="platformX" min="-150" max="150" step="1" value="0">
                    <span id="platformXVal">0</span>
                </label>
                <label>Длина L1: 
                    <input type="range" id="len1" min="0.5" max="2.0" step="0.01" value="1.2">
                    <span id="len1Val">1.20</span>
                </label>
                <label>Длина L2: 
                    <input type="range" id="len2" min="0.5" max="2.0" step="0.01" value="1.2">
                    <span id="len2Val">1.20</span>
                </label>
            </div>
            <div class="control-group">
                <label>Угол θ1: 
                    <input type="range" id="theta1" min="-180" max="180" step="1" value="170">
                    <span id="theta1Val">170</span>
                </label>
                <label>Угол θ2: 
                    <input type="range" id="theta2" min="-180" max="180" step="1" value="10">
                    <span id="theta2Val">10</span>
                </label>
            </div>
        </div>
        <p class="info">Двигайте платформу мышью (за красную точку) или слайдером. Попробуйте удержать маятник в верхнем положении (оба звена направлены вверх).</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
